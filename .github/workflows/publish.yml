name: Publish

# Publishes whisperr to PyPI when a version tag is pushed:
#   git tag v0.1.0 && git push origin v0.1.0
#
# Auth: PyPI Trusted Publishing (OIDC) — NO stored token. Before the first
# publish, configure a Trusted Publisher for the `whisperr` project on pypi.org
# (Publishing → Add a new pending publisher: owner WhisperrAI, repo
# whisperr-python, workflow publish.yml, environment pypi).

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  id-token: write # required for PyPI trusted publishing

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: pypi
    steps:
      - uses: actions/checkout@v4
      - uses: actions/checkout@v4
        with:
          repository: WhisperrAI/whisperr-spec
          path: whisperr-spec
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install --upgrade pip build
      - run: pip install -e ".[dev]"
      - run: pytest -q
        env:
          WHISPERR_SPEC_PATH: ${{ github.workspace }}/whisperr-spec/conformance/wire.json
      - run: python -m build
      - uses: pypa/gh-action-pypi-publish@release/v1
